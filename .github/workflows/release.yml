name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, with or without leading v"
        required: true
        type: string
      dry_run:
        description: "Build and package without publishing a GitHub Release"
        required: false
        default: true
        type: boolean
      force:
        description: "Replace an existing GitHub Release for this version"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Version gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      dry_run: ${{ steps.version.outputs.dry_run }}
      force: ${{ steps.version.outputs.force }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            raw="${GITHUB_REF_NAME}"
            dry_run="false"
            force="false"
          else
            raw="${{ inputs.version }}"
            dry_run="${{ inputs.dry_run }}"
            force="${{ inputs.force }}"
          fi
          version="${raw#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
          echo "force=$force" >> "$GITHUB_OUTPUT"

      - name: Validate version declarations
        shell: bash
        run: scripts/validate-version.sh "${{ steps.version.outputs.version }}"

      - name: Validate manual release ref
        if: github.event_name == 'workflow_dispatch' && steps.version.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          expected_ref="refs/tags/v${{ steps.version.outputs.version }}"
          if [ "$GITHUB_REF" != "$expected_ref" ]; then
            echo "Manual non-dry-run releases must be run from $expected_ref, not $GITHUB_REF." >&2
            exit 1
          fi

  test:
    name: Test on ${{ matrix.os }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global commit.gpgsign false

      - name: Format
        run: cargo fmt --all -- --check

      - name: Version consistency
        shell: bash
        run: scripts/validate-version.sh "${{ needs.version.outputs.version }}"

      - name: Installer syntax
        shell: bash
        run: bash -n scripts/validate-version.sh scripts/package-release.sh install.sh && sh -n install.sh

      - name: PowerShell installer syntax
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          $tokens = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw install.ps1), [ref]$errors)
          if ($null -ne $errors -and $errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-targets

      - name: Doctests
        run: cargo test --workspace --doc

  build:
    name: Build ${{ matrix.target }}
    needs: [version, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            builder: cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            builder: cross
          - os: macos-latest
            target: x86_64-apple-darwin
            builder: cargo
          - os: macos-latest
            target: aarch64-apple-darwin
            builder: cargo
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            builder: cargo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.builder == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build with cargo
        if: matrix.builder == 'cargo'
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Build with cross
        if: matrix.builder == 'cross'
        run: cross build --workspace --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: scripts/package-release.sh "${{ needs.version.outputs.version }}" "${{ matrix.target }}" dist

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: draft-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  checksums:
    name: Checksums
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      id-token: write
      contents: read
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum draft-v${{ needs.version.outputs.version }}-* > SHA256SUMS
          cat SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Upload release payload
        uses: actions/upload-artifact@v4
        with:
          name: draft-release-v${{ needs.version.outputs.version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: [version, checksums]
    if: needs.version.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release payload
        uses: actions/download-artifact@v4
        with:
          name: draft-release-v${{ needs.version.outputs.version }}
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
          FORCE: ${{ needs.version.outputs.force }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            if [ "$FORCE" = "true" ]; then
              gh release delete "$tag" --yes
            else
              echo "Release $tag already exists. Re-run with force=true to replace it." >&2
              exit 1
            fi
          fi
          gh release create "$tag" dist/* \
            --title "Draft $tag" \
            --notes-file RELEASE_NOTES.md \
            --latest
