name: release-readiness

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  rust:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global commit.gpgsign false

      - name: Format
        run: cargo fmt --all -- --check

      - name: Version consistency
        shell: bash
        run: scripts/validate-version.sh

      - name: Installer syntax
        shell: bash
        run: bash -n scripts/validate-version.sh scripts/package-release.sh install.sh && sh -n install.sh

      - name: PowerShell installer syntax
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          $tokens = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw install.ps1), [ref]$errors)
          if ($null -ne $errors -and $errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-targets

      - name: Doctests
        run: cargo test --workspace --doc

      - name: Release build
        run: cargo build --workspace --release
