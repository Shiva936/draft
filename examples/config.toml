# Example .draft/config.toml for Draft v0.3.0.

[identity]
username = "Ada"
email = "ada@example.com"

[save]
message_template = "{{title}}\n\n{{description}}\n\nDraft-Task: {{task_id}}\nDraft-Run: {{run_id}}\nDraft-Changepack: {{changepack_id}}\nDraft-Verified: {{verified}}\nDraft-Risk: {{risk_level}}\nDraft-Receipt: {{receipt_id}}\nDraft-Actor: {{actor_name}} <{{actor_email}}>"

[hooks]
save = ""

[verification]
default_profile = "standard"

[policy]
require_verification = true
require_approval = true
require_human_approval_for_high_risk = true
block_if_tests_fail = true
